services:
  - type: web
    name: luma-display-commerce
    env: node
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: VITE_API_BASE_URL
        value: /api
      - key: API_PROXY_TARGET
        sync: false
